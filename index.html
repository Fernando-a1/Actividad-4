<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Tabla Avanzada</h2>
<table>
    <tr>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Edad</th>
    </tr>
    <tr>
        <td>Fernando</td>
        <td>Carmona</td>
        <td>19</td>
    </tr>
    <tr>
        <td>María</td>
        <td>González</td>
        <td>25</td>
    </tr>
</table>

<h2>Formulario</h2>
<form>
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre"><br><br>

    <label for="intereses">Intereses:</label><br>
    <select id="intereses" name="intereses" multiple>
        <option value="programacion">Programación</option>
        <option value="lectura">Lectura</option>
        <option value="deportes">Deportes</option>
    </select><br><br>

    <label>Lenguajes de programación:</label><br>
    <input type="checkbox" name="lenguajes" value="python"> Python<br>
    <input type="checkbox" name="lenguajes" value="java"> Java<br>
    <input type="checkbox" name="lenguajes" value="javascript"> JavaScript<br>

    <input type="submit" value="Enviar">
</form>
<style>
    table, th, td {
        border: 1px solid black;
        border-collapse: collapse;
    }
    th, td {
        padding: 20px;
    }
</style>
</body>
</html>
